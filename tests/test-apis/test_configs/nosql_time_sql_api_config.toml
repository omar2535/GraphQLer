# Configuration for nosql-time-sql-api integration tests

DEBUG = true
WORDLIST_PATH = "static/wordlist.txt"
OUTPUT_DIRECTORY = "ci-test-nosql-time-sql-api"

MAX_LEVENSHTEIN_THRESHOLD = 20
GRAPH_VISUALIZATION_OUTPUT = "dependency_graph.png"

MAX_OBJECT_CYCLES = 3
MAX_OUTPUT_SELECTOR_DEPTH = 3
HARD_CUTOFF_DEPTH = 20
MAX_INPUT_DEPTH = 20

USE_OBJECTS_BUCKET = true
USE_DEPENDENCY_GRAPH = true
NO_DATA_COUNT_AS_SUCCESS = true

ALLOW_DELETION_OF_OBJECTS = false
MAX_FUZZING_ITERATIONS = 1
MAX_TIME = 3600

# Enable injection attack detectors
SKIP_DOS_ATTACKS = true
SKIP_INJECTION_ATTACKS = false
SKIP_MISC_ATTACKS = true

# Must be longer than the sleep payloads (3 s) plus overhead
REQUEST_TIMEOUT = 15
TIME_BETWEEN_REQUESTS = 0.001

# Time-based SQL: 3-second sleep payloads, confirm at 80% of sleep time
TIME_BASED_SQL_SLEEP_SECONDS = 3
TIME_BASED_SQL_THRESHOLD_RATIO = 0.8

[CUSTOM_HEADERS]
Accept = "application/json"
