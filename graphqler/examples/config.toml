# Configuration

# For debugging purposes
DEBUG = false

# For clairvoyance
WORDLIST_PATH = "static/wordlist.txt"

# For the resolver
MAX_LEVENSHTEIN_THRESHOLD = 20  # A very high threshold, we could probably lower this, but this almost guarantees us to find a matching object name - ID

# ── LLM-based dependency resolver (opt-in) ────────────────────────────────────
# When enabled, GraphQLer sends the full schema to an LLM and asks it to infer
# dependency relationships (hardDependsOn / softDependsOn / mutationType).
# This catches cases the classic ID-name-matching resolver misses:
#   - String inputs that semantically reference an object (e.g. userEmail → User)
#   - Unconventional mutation verb names (provision, wipe, spawn → CREATE/DELETE)
#   - Non-English or domain-specific naming
#
# Model string uses litellm format (provider/model):
#   OpenAI:         "gpt-4o-mini"                        + LLM_API_KEY or OPENAI_API_KEY env var
#   Anthropic:      "anthropic/claude-3-5-haiku-20241022" + LLM_API_KEY or ANTHROPIC_API_KEY env var
#   Ollama (local): "ollama/llama3"                      + LLM_BASE_URL = "http://localhost:11434"
#   LiteLLM proxy:  "openai/my-model"                   + LLM_BASE_URL = "http://my-proxy:4000"
# ──────────────────────────────────────────────────────────────────────────────
USE_LLM = false                       # master toggle
LLM_MODEL = "gpt-4o-mini"            # litellm model string
LLM_API_KEY = ""                      # API key; if empty, reads from env (OPENAI_API_KEY, etc.)
LLM_BASE_URL = ""                     # custom base URL (required for Ollama / LiteLLM proxies)
LLM_RESOLVER_FALLBACK_TO_ID = true    # fall back to classic resolver if LLM call fails
LLM_RESOLVER_SAVE_COMPARISON = true   # save eval/resolver_comparison.json (LLM vs classic diff)
LLM_MAX_RETRIES = 2                   # retry attempts when LLM returns non-JSON (0 = no retries)

# For the linker
GRAPH_VISUALIZATION_OUTPUT = "dependency_graph.png"

# For materializers
MAX_OBJECT_CYCLES = 3
MAX_OUTPUT_SELECTOR_DEPTH = 3
HARD_CUTOFF_DEPTH = 20
MAX_INPUT_DEPTH = 20

# For using GraphQLer in different modes
USE_OBJECTS_BUCKET = true  # This mode is for when we want to use the objects bucket
USE_DEPENDENCY_GRAPH = true  # This mode is for when we want to use DFS through the dependency graph
NO_DATA_COUNT_AS_SUCCESS = false  # This mode is for when we want to count no data in the data object as a success or failure
DISABLE_MUTATIONS = false  # When true, only Query chains are generated — all Mutation nodes are excluded from fuzzing

# For fuzzing
ALLOW_DELETION_OF_OBJECTS = false  # This mode is for when we want to allow the deletion of objects from the objects bucket when coming across a DELETE mutation success
MAX_FUZZING_ITERATIONS = 5
MAX_TIME = 3600  # in seconds
SKIP_MAXIMAL_PAYLOADS = false # This mode is for when we want to skip the maximal payloads
SKIP_DOS_ATTACKS = true # This mode is for when we want to skip the DoS check
SKIP_INJECTION_ATTACKS = false # This mode is for when we want to skip the injection check
SKIP_MISC_ATTACKS = false # This mode is for when we want to skip the miscellaneous attacks

# For each request
REQUEST_TIMEOUT = 120  # in seconds
TIME_BETWEEN_REQUESTS = 0.001  # in seconds

# ── Chain-based IDOR detection (cross-user access testing) ───────────────────
# When IDOR_SECONDARY_AUTH is set, the compiler generates IDOR candidate chains
# during compilation and saves them to chains.yml.  The fuzzer then runs the
# setup nodes with the primary token (victim) so that resources are created,
# and the test nodes with the secondary token (attacker) to check for IDOR.
#
# Usage:
#   Set IDOR_SECONDARY_AUTH to the attacker's Bearer token, OR pass it via the
#   --idor-auth CLI flag (which takes precedence).
#
# Heuristic scoring signals (0.0–1.0):
#   +0.5  CREATE mutation output type matches the test node's input type
#   +0.3  test node name contains private-resource keywords (user/order/profile…)
#   +0.2  test node accepts an ID/Int parameter
#   -0.2  test node name contains public-resource keywords (list/public/catalog…)
#
# Chains scoring below IDOR_HEURISTIC_CONFIDENCE_THRESHOLD are sent to the LLM
# classifier when IDOR_USE_LLM_FALLBACK = true (requires USE_LLM = true).
# ──────────────────────────────────────────────────────────────────────────────
IDOR_SECONDARY_AUTH = ""              # Attacker/secondary Bearer token; empty = IDOR phase skipped
SKIP_IDOR_CHAIN_FUZZING = false       # Set true to disable the IDOR phase even when a secondary token is configured
IDOR_HEURISTIC_CONFIDENCE_THRESHOLD = 0.5  # Chains below this score trigger LLM fallback (when enabled)
IDOR_USE_LLM_FALLBACK = false         # Use LLM classifier for low-confidence chains (requires USE_LLM = true)

# For custom skipping specific nodes"""
SKIP_NODES = []

# Put custom headers here
[CUSTOM_HEADERS]
Accept = "application/json"
